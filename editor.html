<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Editor - Puzzle Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.png">
</head>
<body>
    <h1>Level Editor</h1>

    <h2 style="text-align: center;">Levels</h2>

    <div id="level-selector-editor" class="level-selector" aria-label="Level selector"></div>

    <p style="text-align: center;">
        Edit levels using ASCII tiles: <code>#</code> wall, <code>.</code> empty, <code>P</code> player, <code>B</code> box,
        <code>T</code> player target, <code>X</code> box target.
    </p>

    <div class="row" role="group" aria-label="Tile palette">
        <button class="block-selector" type="button" data-tile="#" aria-label="Wall (#)">#</button>
        <button class="block-selector" type="button" data-tile="." aria-label="Empty (.)">.</button>
        <button class="block-selector" type="button" data-tile="P" aria-label="Player (P)">P</button>
        <button class="block-selector" type="button" data-tile="B" aria-label="Box (B)">B</button>
        <button class="block-selector" type="button" data-tile="T" aria-label="Player target (T)">T</button>
        <button class="block-selector" type="button" data-tile="X" aria-label="Box target (X)">X</button>
    </div>

    <p id="editor-status" style="font-size: 16px; text-align: center;">Click on the grid to place a tile.</p>

    <div class="row editor-dimensions" role="group" aria-label="Grid dimensions">
        <p style="font-weight: 700;">Grid</p>
        <label>W
            <input id="editor-grid-width" type="number" min="1" max="64" step="1" value="6" />
        </label>
        <span style="font-size: 24px;">×</span>
        <label>H
            <input id="editor-grid-height" type="number" min="1" max="64" step="1" value="4" />
        </label>
        <button id="btn-editor-resize" type="button">Resize</button>
    </div>

    <div class="row" role="group" aria-label="Remove row or column">
        <label>Row</label>
        <input id="editor-remove-row" type="number" min="1" max="64" step="1" value="1" />
        <button id="btn-editor-remove-row" type="button">Remove row</button>

        <label>Col</label>
        <input id="editor-remove-col" type="number" min="1" max="64" step="1" value="1" />
        <button id="btn-editor-remove-col" type="button">Remove col</button>
    </div>


    <canvas id="editor-canvas"></canvas>

    <div class="row">
        <button id="btn-editor-apply" type="button">Apply from text</button>
        <button id="btn-editor-export" type="button">Export to clipboard</button>
        <button id="btn-editor-reset" type="button">Reset editor</button>
        <!-- <button id="btn-editor-save" type="button" class="primary">Save to level</button> -->
    </div>

    <textarea id="editor-text" class="editor-text" spellcheck="false" style="font-size: 14px;" aria-label="Level ASCII editor"></textarea>

    <script type="module" src="editor.js"></script>
</body>
</html>
